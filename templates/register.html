{% extends "base.html" %}
{% block title %}Register - Website Monitor{% endblock %}
{% block content %}
<section class="card auth-card">
  <h2>Create Account</h2>
  <p class="section-note">Register with email and password to start using the monitor.</p>
  <form action="{{ url_for('register') }}" method="post" class="auth-form">
    {% if next_path %}
      <input type="hidden" name="next" value="{{ next_path }}">
    {% endif %}
    <label for="email">Email</label>
    <input id="email" name="email" type="email" value="{{ email or '' }}" autocomplete="email" required>

    <label for="password">Password</label>
    <input id="password" name="password" type="password" autocomplete="new-password" minlength="8" required>

    <label for="confirm_password">Confirm Password</label>
    <input
      id="confirm_password"
      name="confirm_password"
      type="password"
      autocomplete="new-password"
      minlength="8"
      required
    >

    <button type="submit" class="btn-primary">Create Account</button>
  </form>
  <p class="auth-switch">
    Already have an account?
    <a href="{{ url_for('login', next=next_path) if next_path else url_for('login') }}">Sign in</a>
  </p>
</section>
{% endblock %}
